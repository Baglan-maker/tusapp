name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  api:
    name: api (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Typecheck (mypy)
        run: uv run mypy app
      - name: Tests (pytest)
        run: uv run pytest

  mobile:
    name: mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Typecheck (tsc)
        run: npx tsc --noEmit
