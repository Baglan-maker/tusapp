name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  api:
    name: api (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tus
          POSTGRES_PASSWORD: tus
          POSTGRES_DB: tus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tus -d tus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Typecheck (mypy)
        run: uv run mypy app
      - name: Migrate (alembic)
        run: uv run alembic upgrade head
      - name: Tests (pytest)
        run: uv run pytest

  mobile:
    name: mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Typecheck (tsc)
        run: npx tsc --noEmit

  deploy:
    name: deploy api (railway)
    needs: [api, mobile]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        # The Dockerfile runs `alembic upgrade head` on boot, so the prod DB
        # migrates itself on each release.
        run: railway up --service "$RAILWAY_SERVICE" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
