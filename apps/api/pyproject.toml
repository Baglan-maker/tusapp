[project]
name = "tus-api"
version = "0.1.0"
description = "Tús — voice dream journal with AI interpretation. Backend API."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.12",
    "sqlalchemy>=2.0.36",
    "alembic>=1.14",
    "psycopg[binary]>=3.2",
    "pgvector>=0.3.6",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "anthropic>=0.69",
    "openai>=1.54",
    "groq>=0.13",
    "httpx>=0.27",
    "pyjwt[crypto]>=2.9",
    "slowapi>=0.1.9",
    # Pure-Python m4a/MP4 duration read — the server-side audio length guard.
    "mutagen>=1.47",
]

[dependency-groups]
dev = [
    "ruff>=0.8",
    "mypy>=1.13",
    "pytest>=8.3",
    "httpx>=0.27",
    # Only used by scripts/eval_golden.py to compare Gemini against Claude.
    # Deliberately a dev dep: it must not ship in the API image.
    "google-genai>=1.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic migration bodies are auto-generated; don't lint their formatting.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.uv]
package = false
